<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tip Calculator</title>
</head>
<body>
    <div class="container">
        <div class="data">
            <h1>Tip Calculator</h1>
            <p>Enter the bill amount and tip percentage to calculate the total</p>
        
            <p>Bil Amount</p>
            <input id="bill-input-el" type="text" placeholder="Enter the Bill Amount" class="red">
            <span id="bill-input-err" class="hide"></span>

            <p>Tip Percentage</p>
            <input id="tip-input-el" type="text" placeholder="Enter the tip percentage" class="red">
            <span id="tip-input-err" class="hide"></span>

            <button id="calculate-btn">Calculate</button>
            <p id="total-el">Total: </p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
